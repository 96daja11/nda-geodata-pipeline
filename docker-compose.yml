version: "3.9"

# Demo-stack: API + frontend mot extern WebODM.
# WebODM körs separat: docker compose -f docker-compose.webodm.yml up -d

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - DEMO_MODE=true
      - WEBODM_URL=http://localhost:8010   # pekar mot WebODM-stacken
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
